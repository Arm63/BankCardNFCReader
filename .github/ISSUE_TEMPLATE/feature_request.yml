name: Feature request
description: Suggest a new feature or EMV tag exposure
title: "[feat]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What use case is not currently supported?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What API surface or EMV tag would solve this? Reference tag numbers (e.g. 5F24, 9F42) where applicable.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, related EMV specs, etc.
